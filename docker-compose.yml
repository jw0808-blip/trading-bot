version: "3.9"

services:
  traderjoes-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traderjoes-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  openclaw:
    image: node:22-slim
    container_name: traderjoes-openclaw
    restart: unless-stopped
    working_dir: /root
    command: >
      bash -c "npm install -g openclaw@latest 2>/dev/null; openclaw gateway"
    env_file:
      - .env
    volumes:
      - ./skills:/root/.openclaw/skills
      - skills-venv:/root/traderjoes-skills
    ports:
      - "3000:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"



  netdata:
    image: netdata/netdata:stable
    container_name: traderjoes-netdata
    hostname: traderjoes-vps
    restart: unless-stopped
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  skills-venv:
  bot-logs:
  netdataconfig:
  netdatalib:
  netdatacache:
