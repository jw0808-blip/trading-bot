
services:
  traderjoes-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traderjoes-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-logs:/app/logs
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: traderjoes-openclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  netdata:
    image: netdata/netdata:stable
    container_name: traderjoes-netdata
    hostname: traderjoes-vps
    restart: unless-stopped
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  bot-logs:
  netdataconfig:
  netdatalib:
  netdatacache:
